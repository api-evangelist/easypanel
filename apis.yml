aid: easypanel
name: Easypanel
description: >-
  Easypanel is a modern, self-hosted server control panel powered by Docker
  and Docker Swarm that simplifies application deployment, database
  provisioning, and server management through an intuitive web interface.
  Operators can deploy applications from GitHub repositories using Heroku
  Buildpacks (Node.js, Ruby, Python, PHP, Go, Java), custom Dockerfiles, or
  Cloud Native Buildpacks; provision managed services for MySQL, MariaDB,
  Postgres, MongoDB, and Redis based on official Docker images; and launch
  1-click templates from a community library of 100+ applications including
  WordPress, Ghost, Strapi, Directus, Appsmith, Appwrite, n8n, Activepieces,
  Anything-LLM, and AdGuard Home. The platform automates Let's Encrypt SSL
  certificate provisioning, supports zero-downtime deployments, exposes
  in-browser terminal, database CLI, and log inspection tools, and provides
  database backup automation. Easypanel is available as a one-click install
  on DigitalOcean, AWS, Vultr, Linode, Hostinger, and Kamatera marketplaces,
  or via manual Docker install on any Linux VPS. Commercial plans range from
  a generous Free tier through Hobby, Growth, and Business tiers with
  multi-user access control, white-labeling, and clustering. Easypanel
  exposes a web UI, a Hub for shared templates, and the Dockerizer tool, but
  does not currently publish a public REST API or first-party developer SDK
  for programmatic panel control.
